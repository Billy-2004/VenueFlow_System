<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard - VenueFlow</title>
    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Student Panel</h2>
    <a href="#"><i class="fas fa-calendar"></i> Timetable</a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <!-- HEADER -->
    <div class="header">
        <h1>Student Dashboard</h1>

        <button onclick="downloadPDF()" class="btn-primary">
            <i class="fas fa-download"></i> Export Timetable
        </button>
    </div>

    <!-- TIMETABLE GRID -->
    <div class="card">
        <h3>Timetable</h3>
        <div id="timetableGrid" class="grid"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
